<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Login - My Portfolio</title>
    <style>
        body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: linear-gradient(to right, #6b11cba9, #2574fc94);
        opacity: 100%; /* Gradient background */
        color: white;
    }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>ログイン</h1>
       
        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label for="email">メールアドレス:</label>
                <input type="email" id="email" name="email" required placeholder="メールアドレスを入力してください">
            </div>
            <div class="form-group">
                <label for="password">パスワード:</label>
                <input type="password" id="password" name="password" required placeholder="パスワードを入力してください">
            </div>
            <button type="submit">ログイン</button>
        </form>
    </div>
    <script>
        function handleLogin(event) {
            event.preventDefault(); // Prevent form submission
            // Redirect to index.html
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
