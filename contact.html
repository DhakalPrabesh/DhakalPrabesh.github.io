<div class="contact-section">
  <div class="contact-header">
    <h2>お問い合わせ</h2>
    <p>
      質問やコメントがあれば、または単に挨拶したい場合は、気軽にご連絡ください！新しいプロジェクトや
      コラボレーション、またはどんな機会でもお話しすることにいつでもオープンです。皆様のフィード
      バックは私にとって大切であり、お話しできることを楽しみにしています！
    </p>
  </div>
  <form class="contact-form">
    <label for="name">氏名:</label>
    <input type="text" id="name" placeholder="お名前を入力してください">
    
    <label for="email">メールアドレス:</label>
    <input type="email" id="email" placeholder="メールアドレスを入力してください">

    <label for="message">メッセージ:</label>
    <textarea id="message" rows="5" placeholder="メッセージを入力してください"></textarea>

    <button type="submit">送信</button>
  </form>
</div>
