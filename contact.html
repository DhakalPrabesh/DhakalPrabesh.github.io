<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポートフォリオ</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <header>
        <h1>ポートフォリオ</h1>
       
        <nav>
            <ul>
                <li>
                    <a href="about.html">自己紹介</a>
                </li>
                <li>
                    <a href="index.html">ポートフォリオ</a>
                </li>
                <li>
                    <a href="contact.html">お問い合わせ</a>
                </li>
            </ul>
        </nav>
    </header>
    
    <main>
        <div class="contact-section">
            <div class="contact-header">
                <h2>お問い合わせ</h2>
                <p>
                    質問やコメントがあれば、または単に挨拶したい場合は、気軽にご連絡ください！新しいプロジェクトや
                    コラボレーション、またはどんな機会でもお話しすることにいつでもオープンです。皆様のフィード
                    バックは私にとって大切であり、お話しできることを楽しみにしています！
                </p>
            </div>
            <div class="section-divider"></div>
            <div class="row">
                <div class="col-md-6">
                    <div class="contact-form-container">
                        <form class="contact-form">
                            <div class="form-group">
                                <label for="name"><i class="fas fa-user form-icon"></i>氏名:</label>
                                <input type="text" class="form-control" id="name" placeholder="お名前を入力してください" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="email"><i class="fas fa-envelope form-icon"></i>メールアドレス:</label>
                                <input type="email" class="form-control" id="email" placeholder="メールアドレスを入力してください" required>
                            </div>

                            <div class="form-group">
                                <label for="message"><i class="fas fa-comment form-icon"></i>メッセージ:</label>
                                <textarea class="form-control" id="message" rows="5" placeholder="メッセージを入力してください" required></textarea>
                            </div>

                            <button type="submit" class="btn btn-primary">送信</button>
                        </form>
                    </div>
                </div>
                <div class="col-md-6">
                    <img src="contact-image.png" alt="Contact Us" class="img-fluid contact-image">
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2023 <a href="https://github.com/DhakalPrabesh"> Prabesh Dhakal</a>. All rights reserved. </p>
    </footer>
</body>
</html>
