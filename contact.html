<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポートフォリオ</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <h1>ポートフォリオ</h1>
       
        <nav>
            <ul>
                <li>
                    <a href="about.html">自己紹介</a>
                </li>
                <li>
                    <a href="index.html">ポートフォリオ</a>
                </li>
                <li>
                    <a href="contact.html">お問い合わせ</a>
                </li>
            </ul>
        </nav>
    </header>
    
    <main>
        <div class="contact-section">
            <div class="contact-header">
                <h2>お問い合わせ</h2>
                <p>
                    質問やコメントがあれば、または単に挨拶したい場合は、気軽にご連絡ください！新しいプロジェクトや
                    コラボレーション、またはどんな機会でもお話しすることにいつでもオープンです。皆様のフィード
                    バックは私にとって大切であり、お話しできることを楽しみにしています！
                </p>
            </div>
            <div class="contact-form-container">
                <form class="contact-form">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <label for="name">氏名:</label>
                        <input type="text" id="name" placeholder="お名前を入力してください" required>
                    </div>
                    
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <label for="email">メールアドレス:</label>
                        <input type="email" id="email" placeholder="メールアドレスを入力してください" required>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-comment-dots"></i>
                        <label for="message">メッセージ:</label>
                        <textarea id="message" rows="5" placeholder="メッセージを入力してください" required></textarea>
                    </div>

                    <button type="submit">送信</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2023 <a href="https://github.com/DhakalPrabesh"> Prabesh Dhakal</a>. All rights reserved. </p>
    </footer>
</body>
</html>
